name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Rename APK to app-release.apk
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk app-release.apk

    - name: Get version name from build.gradle.kts
      id: version
      run: |
        VERSION=$(grep 'versionName' app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Delete existing release if exists
      run: |
        TAG="v${{ steps.version.outputs.version }}"
        gh release delete "$TAG" --yes 2>/dev/null || true
        git push origin :refs/tags/"$TAG" 2>/dev/null || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub Release and upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: "ai asistent2 v${{ steps.version.outputs.version }}"
        body: |
          ## Yangilanishlar v${{ steps.version.outputs.version }}
          - JARVIS endi ovoz bilan javob beradi
          - Ilova ochilganda tinglashga tayyor bo'ladi, HUD bosilganda bevosita eshitadi
          - Voice recognizer partial natijalarini ishlatadi va xato spam kamaytirildi
        files: app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
