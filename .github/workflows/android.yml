name: Android CI/CD

# Faqat main tarmoqqa kod qo'shilganda yoki qo'lda ishga tushirilganda ishlaydi
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Bu kod Actions sahifasida "Run workflow" tugmasini chiqaradi

permissions:
  contents: write # GitHub Releases'ga fayl yuklash uchun shart

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Hamma tag va tarixlarni olish uchun

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # APK faylni topish oson bo'lishi uchun nusxalash
    - name: Rename APK to app-release.apk
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk app-release.apk

    # build.gradle.kts faylidan versiya raqamini aniqlash
    - name: Get version name from build.gradle.kts
      id: version
      run: |
        VERSION=$(grep 'versionName' app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"' | head -n 1)
        if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    # Tayyor bo'lgan APK faylni har ehtimolga qarshi pastda ham yuklab olishga qoldirish
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-asistent-apk-v${{ steps.version.outputs.version }}
        path: app-release.apk

    # GitHub Releases bo'limiga rasman yuklash
    - name: Create GitHub Release and upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
        name: "ai asistent2 v${{ steps.version.outputs.version }} (Build #${{ github.run_number }})"
        body: |
          ## Yangilanishlar v${{ steps.version.outputs.version }}
          - JARVIS endi ovoz bilan javob beradi
          - Ilova ochilganda tinglashga tayyor bo'ladi, HUD bosilganda bevosita eshitadi
          - Voice recognizer partial natijalarini ishlatadi va xato spam kamaytirildi
        files: app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
